name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cargo-check:
    name: cargo check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo check
        working-directory: src-tauri
        run: cargo check 2>&1
